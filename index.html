<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="scoreboard">
                <h3 class="title">HOME</h3>
                <h3 id="home_score" class="score">0</h3>
                <div class="button-stack">
                    <button id="+1-home" onclick="addOneHome()">+1</button>
                    <button id="+2-home" onclick="addTwoHome()">+2</button>
                    <button id="+3-home" onclick="addThreeHome()">+3</button>
                </div>
            </div>
            <div class="scoreboard">
                <h3 class="title">GUEST</h3>
                <h3 id="guest_score" class="score">0</h3>
                <div class="button-stack">
                    <button id="+1-guest" onclick="addOneGuest()">+1</button>
                    <button id="+2-guest" onclick="addTwoGuest()">+2</button>
                    <button id="+3-guest" onclick="addThreeGuest()">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
